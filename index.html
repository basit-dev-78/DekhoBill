<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" name="viewport"/>
    <title>DekhoBill - Professional Portal</title>
    <!-- Tailwind CSS with plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <style>
        :root {
            --color-background: #fffcf9;
            --color-surface: #ffffff;
            --color-primary: #ea580c;
            --color-secondary: #f97316;
            --color-accent: #fb923c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-background);
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }

        .font-display {
            font-family: 'Outfit', sans-serif;
        }

        /* Premium Glassmorphism */
        .premium-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 40px 80px -15px rgba(234, 88, 12, 0.12), inset 0 1px 1px rgba(255, 255, 255, 1);
        }

        /* Checkbox Card Interactivity */
        .check-input:checked ~ .check-bg {
            background-color: rgba(255, 237, 213, 0.95) !important;
            border-color: #f97316 !important;
            border-left-color: #f97316 !important;
            box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.1), 0 2px 4px -1px rgba(249, 115, 22, 0.06) !important;
        }
        .check-input:checked ~ div .check-box {
            background-color: #f97316 !important;
            border-color: #f97316 !important;
        }
        .check-input:checked ~ div .check-icon {
            opacity: 1 !important;
        }
        .check-input:checked ~ div .check-title {
            color: #c2410c !important;
        }
        .check-input:checked ~ div .check-subtitle {
            color: rgba(249, 115, 22, 0.8) !important;
        }

        /* Custom Date Picker */
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            right: 16px;
            cursor: pointer;
            opacity: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Hide default select arrow */
        select {
            background-image: none !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
            appearance: none !important;
        }

        /* Hide Scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .no-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .no-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(234, 88, 12, 0.15);
            border-radius: 10px;
        }
        .no-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(234, 88, 12, 0.3);
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .stagger-1 { animation: slideIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) 0.1s both; }
        .stagger-2 { animation: slideIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) 0.2s both; }
        .stagger-3 { animation: slideIn 0.6s cubic-bezier(0.2, 1, 0.3, 1) 0.3s both; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="min-h-screen overflow-x-hidden">
    <!-- Immersive Background Shader -->
    <div class="fixed inset-0 w-full h-full -z-10" style="display:block;">
        <canvas id="shader-canvas-ANIMATION_1" style="display:block;width:100%;height:100%"></canvas>
        <script>
            (function() {
              const canvas = document.getElementById('shader-canvas-ANIMATION_1');
            
              function syncSize() {
                const w = canvas.clientWidth  || 1280;
                const h = canvas.clientHeight || 720;
                if (canvas.width !== w || canvas.height !== h) {
                  canvas.width  = w;
                  canvas.height = h;
                }
              }
              if (typeof ResizeObserver !== 'undefined') {
                new ResizeObserver(syncSize).observe(canvas);
              }
              syncSize();
            
              const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
              if (!gl) return;
              const vs = `attribute vec2 a_position;
            varying vec2 v_texCoord;
            void main() {
              v_texCoord = a_position * 0.5 + 0.5;
              gl_Position = vec4(a_position, 0.0, 1.0);
            }`;
              const fs = `precision highp float;
            uniform float u_time;
            uniform vec2 u_resolution;
            
            void main() {
                vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                
                // Background color
                vec3 color = vec3(1.0, 0.98, 0.95); // #fffcf9
                
                // Animated soft blobs
                float noise1 = sin(uv.x * 2.0 + u_time * 0.2) * cos(uv.y * 1.5 - u_time * 0.3);
                float noise2 = cos(uv.x * 1.2 - u_time * 0.15) * sin(uv.y * 2.5 + u_time * 0.25);
                
                vec3 accent1 = vec3(0.917, 0.345, 0.047); // #ea580c (Orange)
                vec3 accent2 = vec3(0.984, 0.573, 0.235); // #fb923c (Light Orange)
                
                float mask1 = smoothstep(0.4, 0.8, length(uv - vec2(0.2, 0.8)) + noise1 * 0.1);
                float mask2 = smoothstep(0.4, 0.9, length(uv - vec2(0.8, 0.2)) + noise2 * 0.1);
                
                color = mix(color, accent1, (1.0 - mask1) * 0.08);
                color = mix(color, accent2, (1.0 - mask2) * 0.12);
                
                gl_FragColor = vec4(color, 1.0);
            }`;
              function cs(type, src) {
                const s = gl.createShader(type);
                gl.shaderSource(s, src);
                gl.compileShader(s);
                return s;
              }
              const prog = gl.createProgram();
              gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
              gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
              gl.linkProgram(prog);
              gl.useProgram(prog);
              const buf = gl.createBuffer();
              gl.bindBuffer(gl.ARRAY_BUFFER, buf);
              gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
              const pos = gl.getAttribLocation(prog, 'a_position');
              gl.enableVertexAttribArray(pos);
              gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
              const uTime = gl.getUniformLocation(prog, 'u_time');
              const uRes = gl.getUniformLocation(prog, 'u_resolution');
            
              function render(t) {
                if (typeof ResizeObserver === 'undefined') syncSize();
                gl.viewport(0, 0, canvas.width, canvas.height);
                if (uTime) gl.uniform1f(uTime, t * 0.001);
                if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(render);
              }
              render(0);
            })();
        </script>
    </div>

    <div class="relative z-10 flex flex-col min-h-screen p-4 md:p-6 lg:p-8 w-full">
        
        <!-- Top Navigation -->
        <nav class="flex items-center justify-between mb-8 stagger-1">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-orange-600 to-orange-400 flex items-center justify-center shadow-lg shadow-orange-500/20 border border-orange-300/50">
                    <span class="material-symbols-outlined text-white text-[28px]" style="font-variation-settings: 'FILL' 1;">electric_bolt</span>
                </div>
                <div>
                    <h1 class="font-display font-extrabold text-2xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-orange-600 to-amber-500 leading-none pb-0.5">DekhoBill</h1>
                    <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-orange-600 mt-1">Professional Portal</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button class="w-10 h-10 rounded-full bg-white/80 border border-white flex items-center justify-center text-gray-600 hover:text-orange-600 shadow-sm transition-all hover:scale-105 active:scale-95">
                    <span class="material-symbols-outlined text-[20px]">notifications</span>
                </button>
                <div class="w-10 h-10 rounded-full border-2 border-white shadow-sm overflow-hidden bg-gray-200 hover:scale-105 transition-all cursor-pointer">
                    <img alt="Afaq Ahmed" class="w-full h-full object-cover" src="https://ui-avatars.com/api/?name=Afaq+Ahmed&background=ea580c&color=fff"/>
                </div>
            </div>
        </nav>

        <!-- Hero Status -->
        <div class="mb-8 stagger-2">
            <div class="premium-glass p-6 md:px-8 rounded-[2rem] flex items-center justify-between">
                <div>
                    <h2 class="font-display font-extrabold text-xl text-gray-900 tracking-tight">Welcome, Afaq</h2>
                    <p class="text-sm text-gray-500 font-medium mt-1">Ready to manage your utility records?</p>
                </div>
                <div class="flex flex-col items-end">
                    <div class="flex items-center gap-2 px-4 py-1.5 bg-green-50/80 backdrop-blur-sm rounded-full border border-green-200/50 shadow-sm">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span>
                        <span class="text-[11px] font-bold text-green-700 uppercase tracking-wider">Live System</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Form Container -->
        <main class="flex-1 stagger-3 flex flex-col justify-center">
            <form class="flex flex-col gap-6" id="billForm">
                
                <!-- Utility Provider Card -->
                <div class="premium-glass p-6 md:p-8 rounded-[2.5rem]">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center shadow-inner">
                            <span class="material-symbols-outlined text-orange-600 text-[20px]">settings_input_component</span>
                        </div>
                        <h3 class="font-display font-extrabold text-gray-800 uppercase text-xs tracking-widest">Utility Service Provider</h3>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <!-- Option 1: KE -->
                        <label class="relative cursor-pointer group block h-[60px] rounded-2xl overflow-hidden focus-within:ring-4 focus-within:ring-orange-500/15">
                            <input type="checkbox" name="billType[]" value="ke" class="check-input sr-only">
                            <div class="check-bg absolute inset-0 bg-white/90 backdrop-blur-md border border-gray-200/80 border-l-[4px] border-l-gray-300 rounded-2xl shadow-sm transition-all group-hover:border-gray-300 group-hover:border-l-orange-300"></div>
                            
                            <div class="h-[60px] flex items-center gap-4 px-4 relative z-10 pointer-events-none">
                                <div class="check-box w-5 h-5 rounded flex items-center justify-center border-2 border-gray-300 transition-colors">
                                    <span class="check-icon material-symbols-outlined text-white text-[14px] opacity-0 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
                                </div>
                                <div class="flex-1">
                                    <p class="check-title text-[14px] font-bold text-gray-800 transition-colors">K-Electric</p>
                                    <p class="check-subtitle text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.1em] transition-colors">KE</p>
                                </div>
                            </div>
                        </label>
                        
                        <!-- Option 2: SSGC -->
                        <label class="relative cursor-pointer group block h-[60px] rounded-2xl overflow-hidden focus-within:ring-4 focus-within:ring-orange-500/15">
                            <input type="checkbox" name="billType[]" value="ssgc" class="check-input sr-only">
                            <div class="check-bg absolute inset-0 bg-white/90 backdrop-blur-md border border-gray-200/80 border-l-[4px] border-l-gray-300 rounded-2xl shadow-sm transition-all group-hover:border-gray-300 group-hover:border-l-orange-300"></div>
                            
                            <div class="h-[60px] flex items-center gap-4 px-4 relative z-10 pointer-events-none">
                                <div class="check-box w-5 h-5 rounded flex items-center justify-center border-2 border-gray-300 transition-colors">
                                    <span class="check-icon material-symbols-outlined text-white text-[14px] opacity-0 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
                                </div>
                                <div class="flex-1">
                                    <p class="check-title text-[14px] font-bold text-gray-800 transition-colors">Sui Gas</p>
                                    <p class="check-subtitle text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.1em] transition-colors">SSGC</p>
                                </div>
                            </div>
                        </label>

                        <!-- Option 3: PTCL -->
                        <label class="relative cursor-pointer group block h-[60px] rounded-2xl overflow-hidden focus-within:ring-4 focus-within:ring-orange-500/15">
                            <input type="checkbox" name="billType[]" value="ptcl" class="check-input sr-only">
                            <div class="check-bg absolute inset-0 bg-white/90 backdrop-blur-md border border-gray-200/80 border-l-[4px] border-l-gray-300 rounded-2xl shadow-sm transition-all group-hover:border-gray-300 group-hover:border-l-orange-300"></div>
                            
                            <div class="h-[60px] flex items-center gap-4 px-4 relative z-10 pointer-events-none">
                                <div class="check-box w-5 h-5 rounded flex items-center justify-center border-2 border-gray-300 transition-colors">
                                    <span class="check-icon material-symbols-outlined text-white text-[14px] opacity-0 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
                                </div>
                                <div class="flex-1">
                                    <p class="check-title text-[14px] font-bold text-gray-800 transition-colors">PTCL</p>
                                    <p class="check-subtitle text-[10px] font-extrabold text-gray-400 uppercase tracking-[0.1em] transition-colors">Telecom</p>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Account Entries -->
                <div class="premium-glass p-6 md:p-8 rounded-[2.5rem] flex-1 flex flex-col shadow-xl">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center shadow-inner">
                                <span class="material-symbols-outlined text-orange-600 text-[20px]">list_alt</span>
                            </div>
                            <h3 class="font-display font-extrabold text-gray-800 uppercase text-xs tracking-widest">Account Entries</h3>
                        </div>
                        <button class="flex justify-center items-center gap-2 px-5 py-2.5 rounded-xl bg-white/80 text-orange-600 font-extrabold text-xs shadow-sm border-2 border-orange-200/60 hover:bg-orange-500 hover:text-white hover:border-orange-500 hover:shadow-md transition-all active:scale-95 group outline-none focus:ring-4 focus:ring-orange-500/20" onclick="addAccountRow()" type="button">
                            <span class="material-symbols-outlined text-[18px] group-hover:scale-110 transition-transform">add_circle</span>
                            Add Record
                        </button>
                    </div>

                    <div class="flex flex-col gap-5 overflow-y-auto no-scrollbar max-h-[38vh] p-4 -m-4" id="accountsContainer">
                        <!-- Initial Row -->
                        <div class="account-row grid grid-cols-1 md:grid-cols-2 gap-4 p-5 bg-white/50 backdrop-blur-md rounded-3xl border border-white/80 shadow-sm relative group">
                            <div class="flex flex-col gap-1.5 w-full">
                                <label class="text-[11px] font-extrabold text-gray-400 uppercase tracking-[0.15em] pl-1 mb-0.5 group-focus-within/input:text-orange-500 transition-colors">Account Number <span class="text-orange-400">*</span></label>
                                <div class="relative group/input">
                                    <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 z-10 text-[22px] transition-colors group-focus-within/input:text-orange-500 pointer-events-none">badge</span>
                                    <input class="w-full h-[52px] bg-white border border-gray-200/80 border-l-[4px] border-l-orange-500 rounded-xl pl-12 pr-4 text-[15px] font-bold text-gray-800 shadow-sm hover:shadow-md hover:border-orange-300 focus:bg-white focus:ring-4 focus:ring-orange-500/15 focus:border-orange-500 focus:border-l-orange-600 outline-none transition-all placeholder:text-gray-300" name="accountNo[]" placeholder="e.g. 123456789" required="" type="text"/>
                                </div>
                            </div>
                            <div class="flex flex-col gap-1.5 w-full">
                                <label class="text-[11px] font-extrabold text-gray-400 uppercase tracking-[0.15em] pl-1 mb-0.5 group-focus-within/input:text-orange-500 transition-colors">Expected Date <span class="text-orange-400">*</span></label>
                                <div class="relative group/input flex items-center">
                                    <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 z-10 text-[22px] transition-colors group-focus-within/input:text-orange-500 pointer-events-none">calendar_today</span>
                                    <input class="w-full h-[52px] bg-white border border-gray-200/80 border-l-[4px] border-l-orange-500 rounded-xl pl-12 pr-4 text-[15px] font-bold text-gray-800 shadow-sm hover:shadow-md hover:border-orange-300 focus:bg-white focus:ring-4 focus:ring-orange-500/15 focus:border-orange-500 focus:border-l-orange-600 outline-none transition-all flex items-center justify-center text-center placeholder:text-gray-300" name="expectedDate[]" required="" type="date"/>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Button -->
                <div class="pb-8 mt-2">
                    <button class="w-full h-16 md:h-20 bg-gradient-to-r from-orange-600 via-orange-500 to-orange-600 bg-[length:200%_auto] hover:bg-right rounded-2xl md:rounded-[2rem] text-white font-display font-extrabold text-lg md:text-xl shadow-[0_8px_24px_rgba(234,88,12,0.4)] hover:shadow-[0_16px_40px_rgba(234,88,12,0.6)] flex items-center justify-center gap-3 group relative overflow-hidden transition-all duration-500 hover:-translate-y-1 active:translate-y-0" type="submit">
                        <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                        <span class="relative z-10 tracking-wide uppercase">Save All Records</span>
                        <span class="material-symbols-outlined relative z-10 transition-transform group-hover:translate-x-2 font-bold text-[24px]">arrow_forward</span>
                    </button>
                    <p class="text-center text-[11px] font-bold text-gray-400 mt-6 uppercase tracking-widest">
                        Protected by <span class="text-orange-500">DekhoBill</span> Quantum Security
                    </p>
                </div>
            </form>
        </main>
    </div>

    <script>
        function addAccountRow() {
            const container = document.getElementById('accountsContainer');
            const row = document.createElement('div');
            row.className = 'account-row grid grid-cols-1 md:grid-cols-2 gap-4 p-5 bg-white/50 backdrop-blur-md rounded-3xl border border-white/80 shadow-sm relative animate-slideIn mt-1';
            
            row.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 w-8 h-8 bg-red-50 text-red-500 rounded-full flex items-center justify-center shadow-sm border border-red-100 hover:bg-red-500 hover:text-white hover:scale-110 active:scale-95 transition-all z-30 outline-none focus:ring-4 focus:ring-red-500/30">
                    <span class="material-symbols-outlined text-[18px]">close</span>
                </button>
                <div class="flex flex-col gap-1.5 w-full">
                    <label class="text-[11px] font-extrabold text-gray-400 uppercase tracking-[0.15em] pl-1 mb-0.5 group-focus-within/input:text-orange-500 transition-colors">Account Number <span class="text-orange-400">*</span></label>
                    <div class="relative group/input">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 z-10 text-[22px] transition-colors group-focus-within/input:text-orange-500 pointer-events-none">badge</span>
                        <input type="text" name="accountNo[]" required placeholder="e.g. 123456789" class="w-full h-[52px] bg-white border border-gray-200/80 border-l-[4px] border-l-orange-500 rounded-xl pl-12 pr-4 text-[15px] font-bold text-gray-800 shadow-sm hover:shadow-md hover:border-orange-300 focus:bg-white focus:ring-4 focus:ring-orange-500/15 focus:border-orange-500 focus:border-l-orange-600 outline-none transition-all placeholder:text-gray-300">
                    </div>
                </div>
                <div class="flex flex-col gap-1.5 w-full">
                    <label class="text-[11px] font-extrabold text-gray-400 uppercase tracking-[0.15em] pl-1 mb-0.5 group-focus-within/input:text-orange-500 transition-colors">Expected Date <span class="text-orange-400">*</span></label>
                    <div class="relative group/input flex items-center">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 z-10 text-[22px] transition-colors group-focus-within/input:text-orange-500 pointer-events-none">calendar_today</span>
                        <input type="date" name="expectedDate[]" required class="w-full h-[52px] bg-white border border-gray-200/80 border-l-[4px] border-l-orange-500 rounded-xl pl-12 pr-4 text-[15px] font-bold text-gray-800 shadow-sm hover:shadow-md hover:border-orange-300 focus:bg-white focus:ring-4 focus:ring-orange-500/15 focus:border-orange-500 focus:border-l-orange-600 outline-none transition-all flex items-center justify-center text-center placeholder:text-gray-300">
                    </div>
                </div>
            `;
            
            container.appendChild(row);
            
            // Auto scroll to the newly added row smoothly
            setTimeout(() => {
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        document.getElementById('billForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin text-[24px]">progress_activity</span> <span class="relative z-10 tracking-wide">Processing...</span>`;
            btn.classList.add('opacity-90', 'pointer-events-none');
            
            setTimeout(() => {
                btn.classList.remove('from-orange-600', 'to-orange-500', 'shadow-[0_8px_24px_rgba(234,88,12,0.3)]', 'hover:shadow-[0_12px_32px_rgba(234,88,12,0.4)]');
                btn.classList.add('from-green-600', 'to-green-500', 'shadow-[0_8px_24px_rgba(34,197,94,0.3)]', 'hover:shadow-[0_12px_32px_rgba(34,197,94,0.4)]');
                btn.innerHTML = `<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">check_circle</span> <span class="relative z-10 tracking-wide">Records Saved!</span>`;
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.remove('opacity-90', 'pointer-events-none');
                    btn.classList.add('from-orange-600', 'to-orange-500', 'shadow-[0_8px_24px_rgba(234,88,12,0.3)]', 'hover:shadow-[0_12px_32px_rgba(234,88,12,0.4)]');
                    btn.classList.remove('from-green-600', 'to-green-500', 'shadow-[0_8px_24px_rgba(34,197,94,0.3)]', 'hover:shadow-[0_12px_32px_rgba(34,197,94,0.4)]');
                    btn.innerHTML = originalContent;
                    
                    // Reset the form values
                    this.reset();
                    
                    // Remove dynamically added rows (keep only the first one)
                    const container = document.getElementById('accountsContainer');
                    const rows = container.querySelectorAll('.account-row');
                    for (let i = 1; i < rows.length; i++) {
                        rows[i].remove();
                    }
                }, 2000);
            }, 1500);
        });
    </script>
</body>
</html>
